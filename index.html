<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-content container">
      <h1 id="hero-title">Tours in Kyrgyzstan with Professional Guides</h1>
      <p id="hero-description">Discover the best routes, activities, and places in Kyrgyzstan</p>
      <a href="calculator.html" class="button">Calculate Your Tour</a>
    </div>
  </section>

  <!-- STICKY NAV -->
  <nav class="sticky-nav">
    <div class="container nav-list">
      <a href="#tours">Tours</a>
      <a href="#places">Places</a>
      <a href="#activities">Activities</a>

  <!-- TOURS SECTION -->

    <h2 class="section-title container">Main Tours</h2>
    <div class="container carousel" id="tours-carousel">
      <!-- JS will render tour cards here -->

  <!-- PLACES SECTION -->
  <section id="places">
    <h2 class="section-title container">Additional Places</h2>
    <div class="container carousel" id="places-carousel">
      <!-- JS will render place cards here -->

  <!-- ACTIVITIES SECTION -->
  <section id="activities">
    <h2 class="section-title container">Activities</h2>
    <div class="container carousel" id="activities-carousel">
      <!-- JS will render activity cards here -->

  </section>

  <!-- GUIDES SECTION -->
  <section id="guides">
    <h2 class="section-title container">Professional Guides</h2>
    <div class="container carousel" id="guides-carousel">
      <!-- JS will render guide cards here -->

  </section>
