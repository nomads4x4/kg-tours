<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyrgyzstan Tours</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Hero Section -->
<section class="hero" id="hero">
    <h1 id="hero-title">Tours in Kyrgyzstan</h1>
    <p id="hero-desc">Professional guides, unforgettable experiences!</p>
    <a href="calculator.html" class="btn">Calculate Your Tour</a>
</section>

<!-- Sticky Navigation -->
<nav class="sticky-nav">
    <a href="#tours-section">Tours</a>
    <a href="#places-section">Places</a>
    <a href="#activities-section">Activities</a>
    <a href="#guides-section">Guides</a>
</nav>

<!-- Tours Section -->
<section id="tours-section">
    <h2>Tours</h2>
    <div class="card-container" id="tours-container">
        <!-- JS will render tour cards here -->
    </div>
</section>

<!-- Places Section -->
<section id="places-section">
    <h2>Additional Places</h2>
    <div class="card-container" id="places-container">
        <!-- JS will render place cards here -->
    </div>
</section>

<!-- Activities Section -->
<section id="activities-section">
    <h2>Activities</h2>
    <div class="card-container" id="activities-container">
        <!-- JS will render activity cards here -->
    </div>
</section>

<!-- Guides Section -->
<section id="guides-section">
    <h2>Guides</h2>
    <div class="card-container" id="guides-container">
        <!-- JS will render guide cards here -->
    </div>
</section>

<!-- Footer -->
<footer>
    <p>Follow us:</p>
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://t.me" target="_blank">Telegram</a>
    <a href="https://tiktok.com" target="_blank">TikTok</a>
</footer>

<!-- JS -->
<script src="app.js"></script>
<script>
    // Scroll offset for sticky nav links
    document.querySelectorAll('.sticky-nav a').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const targetId = link.getAttribute('href').substring(1);
            const targetEl = document.getElementById(targetId);
            const offset = window.innerHeight / 3; // 1/3 от экрана
            window.scrollTo({
                top: targetEl.offsetTop - offset,
                behavior: 'smooth'
            });
        });
    });
</script>

</body>
</html>
