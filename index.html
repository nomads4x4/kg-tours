<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyrgyzstan 4x4 Tours</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>Kyrgyzstan 4x4 Tours</h1>
<p>Private adventures with local guides</p>
<a href="calculator.html"><button>Calculate your tour</button></a>
</div>
</section>

<div class="container">

<h2>Tours</h2>
<div id="tours" class="card-grid"></div>

<h2>Guides</h2>
<div id="guides" class="card-grid"></div>

</div>

<script>
async function load(){

const tours = await fetch('./data/tours.json').then(r=>r.json())
const guides = await fetch('./data/guides.json').then(r=>r.json())

const toursContainer=document.getElementById('tours')
tours.forEach(t=>{
toursContainer.innerHTML+=`
<div class="card">
<img src="${t.image}">
<h3>${t.name}</h3>
<p>${t.description}</p>
</div>`
})

const guidesContainer=document.getElementById('guides')
guides.forEach(g=>{
guidesContainer.innerHTML+=`
<div class="card">
<img src="${g.image}">
<h3>${g.name}</h3>
<p>${g.description}</p>
</div>`
})

}

load()
</script>

</body>
</html>
