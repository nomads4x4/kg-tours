<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyrgyzstan Tours</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1 id="hero-title">Tours in Kyrgyzstan with Professional Guides</h1>
    <p id="hero-description">Discover the best routes, hidden places, and unique activities across Kyrgyzstan</p>
    <button onclick="window.location.href='calculator.html'">Calculate Your Tour</button>
  </section>

  <!-- Sticky Navigation -->
  <nav>
    <a href="#tours-section">Tours</a>
    <a href="#places-section">Places</a>
    <a href="#activities-section">Activities</a>
    <a href="#guides-section">Guides</a>
  </nav>

  <!-- Tours Section -->
  <section id="tours-section">
    <h2>Tours</h2>
    <div class="carousel" id="tours-carousel">
      <!-- JS will render tour cards here -->
    </div>
  </section>

  <!-- Places Section -->
  <section id="places-section">
    <h2>Places</h2>
    <div class="carousel" id="places-carousel">
      <!-- JS will render place cards here -->
    </div>
  </section>

  <!-- Activities Section -->
  <section id="activities-section">
    <h2>Activities</h2>
    <div class="carousel" id="activities-carousel">
      <!-- JS will render activity cards here -->
    </div>
  </section>

  <!-- Guides Section -->
  <section id="guides-section">
    <h2>Guides</h2>
    <div class="carousel" id="guides-carousel">
      <!-- JS will render guide cards here -->
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
