<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kyrgyzstan Tours</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- =================== Hero =================== -->
<section class="hero" id="hero">
    <h1 id="hero-title">Kyrgyzstan Tours with Professional Guides</h1>
    <p id="hero-description">Explore the beauty of Kyrgyzstan with experienced guides. Adventure, culture, and unforgettable memories await you!</p>
    <button id="hero-calculator-btn">Calculate Your Tour</button>
</section>

<!-- =================== Sticky Navigation =================== -->
<nav>
    <ul>
        <li><a href="#tours">Tours</a></li>
        <li><a href="#places">Places</a></li>
        <li><a href="#activities">Activities</a></li>
        <li><a href="#guides">Guides</a></li>
    </ul>
</nav>

<!-- =================== Tours Section =================== -->
<section id="tours">
    <h2>Tours</h2>
    <div class="carousel" id="tours-carousel">
        <!-- JS вставит карточки из tours.json -->
    </div>
</section>

<!-- =================== Places Section =================== -->
<section id="places">
    <h2>Places</h2>
    <div class="carousel" id="places-carousel">
        <!-- JS вставит карточки из places.json -->
    </div>
</section>

<!-- =================== Activities Section =================== -->
<section id="activities">
    <h2>Activities</h2>
    <div class="carousel" id="activities-carousel">
        <!-- JS вставит карточки из activities.json -->
    </div>
</section>

<!-- =================== Guides Section =================== -->
<section id="guides">
    <h2>Guides</h2>
    <div class="carousel" id="guides-carousel">
        <!-- JS вставит карточки из guides.json -->
    </div>
</section>

<script src="app.js"></script>
<script>
/* =================== Sticky nav scroll offset =================== */
document.querySelectorAll('nav a').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        target.scrollIntoView({behavior: 'smooth', block: 'start'});
    });
});

/* =================== Hero calculator button =================== */
document.getElementById('hero-calculator-btn').addEventListener('click', () => {
    window.location.href = 'calculator.html';
});
</script>
</body>
</html>
