<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kyrgyzstan 4x4 Tours</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#F8F9FA;
--text:#333333;
--accent:#1f2a44;
--card-bg:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
position:relative;
height:420px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:url('images/hero.jpg') center/cover no-repeat;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:42px;
margin-bottom:12px;
}

.hero button{
background:white;
border:none;
padding:14px 28px;
border-radius:8px;
cursor:pointer;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:24px;
margin-top:20px;
}

.card{
background:white;
border-radius:12px;
padding:24px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.card img{
width:100%;
border-radius:8px;
margin-bottom:10px;
}

h2{margin-top:40px;}

</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>Kyrgyzstan 4x4 Tours</h1>
<p>Private adventures with local guides</p>
<a href="calculator.html"><button>Calculate your tour</button></a>
</div>
</section>

<div class="container">

<h2>Tours</h2>
<div id="tours" class="card-grid"></div>

<h2>Guides</h2>
<div id="guides" class="card-grid"></div>

</div>

<script>
async function load(){

const tours = await fetch('./data/tours.json').then(r=>r.json())
const guides = await fetch('./data/guides.json').then(r=>r.json())

const toursContainer=document.getElementById('tours')
tours.forEach(t=>{
toursContainer.innerHTML+=`
<div class="card">
<img src="${t.image}">
<h3>${t.name}</h3>
<p>${t.description}</p>
</div>`
})

const guidesContainer=document.getElementById('guides')
guides.forEach(g=>{
guidesContainer.innerHTML+=`
<div class="card">
<img src="${g.image}">
<h3>${g.name}</h3>
<p>${g.description}</p>
</div>`
})

}

load()
</script>

</body>
</html>
