<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Туры по Кыргызстану</title>

<style>
body {
font-family: Arial;
margin: 0;
background: #f5f7fb;
}

.hero {
padding: 40px 20px;
text-align: center;
background: white;
}

.hero h1 {
margin-bottom: 10px;
}

.hero p {
color: #555;
}

.btn {
display: inline-block;
margin-top: 15px;
padding: 12px 20px;
background: #2A7FFF;
color: white;
border-radius: 8px;
text-decoration: none;
font-weight: bold;
}

.section {
padding: 20px;
}

.section h2 {
margin-bottom: 15px;
}

.carousel {
display: flex;
gap: 15px;
overflow-x: auto;
padding-bottom: 10px;
}

.card {
min-width: 250px;
background: white;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card img {
width: 100%;
height: 160px;
object-fit: cover;
}

.card-content {
padding: 15px;
}

.card-content h3 {
margin: 0 0 5px 0;
}

.card-content p {
margin: 0;
color: #555;
font-size: 14px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Туры по Кыргызстану</h1>
<p>Индивидуальные путешествия с профессиональными гидами. Горы, озёра и настоящая кочевая культура.</p>
<a href="calculator.html" class="btn">Рассчитать стоимость тура</a>
</div>

<div class="section">
<h2>Популярные маршруты</h2>
<div class="carousel" id="tours"></div>
</div>

<div class="section">
<h2>Наши гиды</h2>
<div class="carousel" id="guides"></div>
</div>

<script>

fetch('data/tours.json')
.then(res => res.json())
.then(tours => {
const container = document.getElementById('tours')

tours.forEach(t => {
container.innerHTML += `
<div class="card">
<img src="${t.image}" loading="lazy">
<div class="card-content">
<h3>${t.name}</h3>
<p>${t.description}</p>
<p>${t.days} дней</p>
</div>
</div>`
})
})

fetch('data/guides.json')
.then(res => res.json())
.then(guides => {
const container = document.getElementById('guides')

guides.forEach(g => {
container.innerHTML += `
<div class="card">
<img src="${g.image}" loading="lazy">
<div class="card-content">
<h3>${g.name}</h3>
<p>${g.type}</p>
<p>${g.description}</p>
</div>
</div>`
})
})

</script>

</body>
</html>
