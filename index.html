<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyrgyzstan Tours</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero" id="hero" style="background-image: url('images/hero/hero1.jpeg');">
    <div class="hero-content">
      <h1>Tours in Kyrgyzstan with Professional Guides</h1>
      <p>Discover the beauty of Kyrgyzstan through curated tours and activities. Adventure awaits!</p>
      <button onclick="window.location.href='calculator.html'">Calculate Your Tour</button>
    </div>
  </section>

  <!-- Sticky Navigation -->
  <nav class="sticky-nav">
    <ul>
      <li><a href="#tours" data-target="tours">Tours</a></li>
      <li><a href="#places" data-target="places">Places</a></li>
      <li><a href="#activities" data-target="activities">Activities</a></li>
      <li><a href="#guides" data-target="guides">Guides</a></li>
    </ul>
  </nav>

  <!-- Tours Section -->
  <section id="tours">
    <h2>Main Tours</h2>
    <div class="card-carousel" id="tours-carousel">
      <!-- JS подставит карточки -->
    </div>
  </section>

  <!-- Places Section -->
  <section id="places">
    <h2>Additional Places</h2>
    <div class="card-carousel" id="places-carousel">
      <!-- JS подставит карточки -->
    </div>
  </section>

  <!-- Activities Section -->
  <section id="activities">
    <h2>Activities</h2>
    <div class="card-carousel" id="activities-carousel">
      <!-- JS подставит карточки -->
    </div>
  </section>

  <!-- Guides Section -->
  <section id="guides">
    <h2>Guides</h2>
    <div class="card-carousel" id="guides-carousel">
      <!-- JS подставит карточки -->
    </div>
  </section>

  <!-- Подключение JS -->
  <script src="app.js"></script>

  <!-- Плавный скролл для sticky nav -->
  <script>
    document.querySelectorAll('nav.sticky-nav a').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('data-target');
        const targetEl = document.getElementById(targetId);
        const offset = document.querySelector('nav.sticky-nav').offsetHeight;
        const bodyRect = document.body.getBoundingClientRect().top;
        const elementRect = targetEl.getBoundingClientRect().top;
        const elementPosition = elementRect - bodyRect;
        const offsetPosition = elementPosition - offset;
        window.scrollTo({
          top: offsetPosition,
          behavior: "smooth"
        });
      });
    });
  </script>

</body>
</html>
