<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HERO -->
<header class="hero" id="item-hero">
    <div class="hero-content container">
        <h1 id="item-title"></h1>
    </div>
</header>

<!-- IMAGE CAROUSEL -->
<section class="section">
    <div class="container">
        <div class="carousel" id="item-carousel"></div>
    </div>
</section>

<!-- DESCRIPTION -->
<section class="section">
    <div class="container">
        <h2 class="section-title">Description</h2>
        <p id="item-description"></p>
    </div>
</section>

<!-- DETAILS -->
<section class="section">
    <div class="container">
        <h2 class="section-title">Details</h2>
        <div id="item-details"></div>
    </div>
</section>

<div class="footer-spacer"></div>

<footer>
    <div class="container">
        <a href="index.html" class="btn">← Back to main page</a>
    </div>
</footer>

<script>
async function loadJSON(path) {
    const response = await fetch(path);
    return await response.json();
}

function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        type: params.get('type'),
        id: params.get('id')
    };
}

function renderImages(images) {
    const container = document.getElementById('item-carousel');

    images.forEach(img => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `<img src="${img}" alt="">`;
        container.appendChild(card);
    });
}

function renderDetails(item) {
    const container = document.getElementById('item-details');

    let html = '';

    if (item.days)
        html += `<p><strong>Duration:</strong> ${item.days} days</p>`;

    if (item.price)
        html += `<p><strong>Price:</strong> $${item.price}</p>`;

    if (item.groupPrice)
        html += `<p><strong>Group Price:</strong> $${item.groupPrice}</p>`;

    if (item.personPrice)
        html += `<p><strong>Per Person:</strong> $${item.personPrice}</p>`;

    container.innerHTML = html;
}

function getTitlePrefix(type) {
    switch(type) {
        case 'tours': return 'Tour';
        case 'places': return 'Place';
        case 'activities': return 'Activity';
        case 'guides': return 'Guide';
        default: return '';
    }
}

async function init() {
    const {type, id} = getParams();

    const data = await loadJSON(`data/${type}.json`);
    const item = data.find(i => i.id === id);

    document.getElementById('item-title').textContent =
        `${getTitlePrefix(type)} / ${item.title}`;

    document.getElementById('item-description').textContent =
        item.description;

    renderImages(item.images);
    renderDetails(item);

    document.getElementById('item-hero').style.backgroundImage =
        `url(${item.images[0]})`;
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
