<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Calculator</title>

<style>
body{font-family:Arial;margin:0;background:#f5f7fb;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
label{display:block;margin-top:10px;font-weight:bold;}
select,input{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ddd;}
button{margin-top:15px;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;}
.calc{background:#2A7FFF;color:white;}
.whatsapp{background:#25D366;color:white;}
.telegram{background:#0088cc;color:white;}
.result{font-size:20px;font-weight:bold;margin-top:10px;}
#activities label{
display:flex;
justify-content:space-between;
background:#f5f7fb;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>Tour Calculator</h1>

<div class="card">

<label>Route</label>
<select id="route"></select>

<label>RouteDays</label>
<input type="number" id="days" value="1" min="1">

<label>People</label>
<input type="number" id="people" value="1" min="1">

<label>Guide</label>
<select id="guide"></select>

<label>Car</label>
<select id="car"></select>

<label>Activities</label>
<div id="activities"></div>

<button class="calc" onclick="calculate()">Calculate</button>

<div class="result" id="result">Стоимость: -</div>

<button class="whatsapp" onclick="sendWhatsApp()">WhatsApp</button>
<button class="telegram" onclick="sendTelegram()">Telegram</button>

</div>
</div>

<script>

let tours=[], guides=[], cars=[], activities=[]
let totalPrice=0

async function loadData(){

tours = await fetch('data/tours.json').then(r=>r.json())
guides = await fetch('data/guides.json').then(r=>r.json())
cars = await fetch('data/cars.json').then(r=>r.json())

const routeSelect = document.getElementById("route")
tours.forEach((t,i)=>{
routeSelect.innerHTML += `<option value="${i}">${t.name}</option>`
})

const guideSelect = document.getElementById("guide")
guides.forEach((g,i)=>{
guideSelect.innerHTML += `<option value="${i}">${g.name}</option>`
})

const carSelect = document.getElementById("car")
cars.forEach((c,i)=>{
carSelect.innerHTML += `<option value="${i}">${c.name}</option>`
})

}

loadData()

activities = await fetch('data/activities.json').then(r=>r.json())

const actContainer = document.getElementById("activities")
activities.forEach((a,i)=>{
actContainer.innerHTML += `
<label>
<span>${a.name}</span>
<input type="checkbox" value="${i}">
</label>`
})
  
function calculate(){

let routeIndex = document.getElementById("route").value
let guideIndex = document.getElementById("guide").value
let carIndex = document.getElementById("car").value
let days = Number(document.getElementById("days").value)
let people = Number(document.getElementById("people").value)

let tour = tours[routeIndex]
let guide = guides[guideIndex]
let car = cars[carIndex]

let carsNeeded = Math.ceil(people / car.seats)

let activitiesTotal = 0

document.querySelectorAll("#activities input:checked")
.forEach(cb=>{
let act = activities[cb.value]
activitiesTotal += Number(act.price) * people
})

totalPrice =
(Number(tour.price) * days) +
(Number(guide.price) * days * carsNeeded) +
(Number(car.price) * days * carsNeeded) +
activitiesTotal

document.getElementById("result").innerText =
"Total price: " + totalPrice + " USD"
}

function buildMessage(){

let routeIndex = document.getElementById("route").value
let guideIndex = document.getElementById("guide").value
let carIndex = document.getElementById("car").value

let days = document.getElementById("days").value
let people = document.getElementById("people").value

let selectedActivities = []

document.querySelectorAll("#activities input:checked")
.forEach(cb=>{
selectedActivities.push(activities[cb.value].name)
})

return `Hello!
I selected the following tour:

Route: ${tours[routeIndex].name}
Days: ${days}
People: ${people}
Guide: ${guides[guideIndex].name}
Car: ${cars[carIndex].name}
Activities: ${selectedActivities.join(", ") || "None"}

Estimated price: ${totalPrice} USD

I'd like to discuss booking.`
}

function sendWhatsApp(){
let text = encodeURIComponent(buildMessage())
window.open(`https://wa.me/996555900855?text=${text}`)
}

function sendTelegram(){
let text = encodeURIComponent(buildMessage())
window.open(`https://t.me/ErkinMms?text=${text}`)
}

</script>

</body>
</html>
