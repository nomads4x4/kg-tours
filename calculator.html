<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .item-hero {
      width: 100%;
      height: 25vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
      background-color: #4c9ca0;
      color: white;
    }
    .calculator {
      max-width: 800px;
      margin: 2rem auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }
    label {
      font-weight: bold;
    }
    select, input {
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
    }
    .btn-calc {
      padding: 0.75rem;
      background-color: #4c9ca0;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
    }
    .result {
      margin-top: 1rem;
      font-weight: bold;
    }
    .back-btn {
      margin: 2rem 1rem;
    }
  </style>
</head>
<body>

  <section class="item-hero">
    <h1>Tour Calculator</h1>
    <p>Calculate your trip cost with selected parameters</p>
  </section>

  <div class="calculator">
    <label for="people">Number of People</label>
    <input type="number" id="people" min="1" value="1">

    <label for="date">Trip Date</label>
    <input type="date" id="date">

    <label for="tour">Select Tour</label>
    <select id="tour"></select>

    <label for="places">Additional Places</label>
    <select id="places" multiple></select>

    <label for="activities">Additional Activities</label>
    <select id="activities" multiple></select>

    <label for="guide">Select Guide</label>
    <select id="guide"></select>

    <button class="btn-calc" id="calculate-btn">Calculate Total</button>

    <div class="result" id="result"></div>
    <a id="contact-link" target="_blank" style="display:none;">Contact via WhatsApp/Telegram</a>
  </div>

  <button class="btn back-btn" onclick="window.location.href='index.html'">Back to Home</button>

  <script src="app.js"></script>
  <script>
    async function fetchJSON(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`Failed to load ${path}`);
      return await res.json();
    }

    async function initCalculator() {
      const tours = await fetchJSON('data/tours.json');
      const places = await fetchJSON('data/places.json');
      const activities = await fetchJSON('data/activities.json');
      const guides = await fetchJSON('data/guides.json');
      const season = await fetchJSON('data/season.json');

      const tourSelect = document.getElementById('tour');
      tours.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name;
        tourSelect.appendChild(opt);
      });

      const placesSelect = document.getElementById('places');
      places.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.name} (+${p.days} days, $${p.price})`;
        placesSelect.appendChild(opt);
      });

      const activitiesSelect = document.getElementById('activities');
      activities.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = `${a.name} ($${a.price})`;
        activitiesSelect.appendChild(opt);
      });

      const guideSelect = document.getElementById('guide');
      guides.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.name} ($${g.price}/day)`;
        guideSelect.appendChild(opt);
      });

      document.getElementById('calculate-btn').addEventListener('click', () => {
        const people = parseInt(document.getElementById('people').value);
        const date = new Date(document.getElementById('date').value);
        const tour = tours.find(t => t.id === tourSelect.value);
        const selectedPlaces = Array.from(placesSelect.selectedOptions).map(o => places.find(p => p.id === o.value));
        const selectedActivities = Array.from(activitiesSelect.selectedOptions).map(o => activities.find(a => a.id === o.value));
        const guide = guides.find(g => g.id === guideSelect.value);

        // total days
        const totalDays = tour.days + selectedPlaces.reduce((sum,p)=>sum+p.days,0);

        // number of guides
        const guidesCount = Math.ceil(people / 4);

        // activities price
        const activitiesPrice = selectedActivities.reduce((sum,a)=>sum+a.price,0);

        // season multiplier
        const seasonStart = new Date(season.seasonStart);
        const seasonEnd = new Date(season.seasonEnd);
        const multiplier = (date >= seasonStart && date <= seasonEnd) ? season.seasonMultiplier : season.offSeasonMultiplier;

        // total price
        let totalPrice = (tour.price + selectedPlaces.reduce((sum,p)=>sum+p.price,0) + activitiesPrice + (guidesCount * guide.price * totalDays)) * multiplier;

        totalPrice = Math.round(totalPrice);

        const resultDiv = document.getElementById('result');
        resultDiv.textContent = `Total Price: $${totalPrice} for ${people} people, ${totalDays} days, ${guidesCount} guide(s).`;

        // Contact link
        const contactLink = document.getElementById('contact-link');
        let message = `Добрый день! Я подобрал следующие параметры для тура:\n`;
        message += `People: ${people}\n`;
        message += `Date: ${date.toLocaleDateString()}\n`;
        message += `Tour: ${tour.name}\n`;
        if(selectedPlaces.length) message += `Places: ${selectedPlaces.map(p=>p.name).join(', ')}\n`;
        if(selectedActivities.length) message += `Activities: ${selectedActivities.map(a=>a.name).join(', ')}\n`;
        message += `Guide: ${guide.name}\n`;
        message += `Total Price: $${totalPrice}`;

        const whatsappUrl = `https://wa.me/996555900855?text=${encodeURIComponent(message)}`;
        contactLink.href = whatsappUrl;
        contactLink.style.display = 'inline-block';
        contactLink.textContent = 'Contact via WhatsApp/Telegram';
      });
    }

    document.addEventListener('DOMContentLoaded', initCalculator);
  </script>

</body>
</html>
