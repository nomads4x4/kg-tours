<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Calculator</title>

<link rel="stylesheet" href="styles.css">

<style>
.calc-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.calc-block{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.calc-block h3{
margin-bottom:12px;
}

.calc-full{
grid-column:1/-1;
}

select,input[type="date"]{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.checkbox-list{
display:flex;
flex-direction:column;
gap:8px;
}

.checkbox-list label{
display:flex;
gap:10px;
cursor:pointer;
}

.total-bar{
position:relative;
background:white;
padding:16px;
margin-top:20px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:flex-start;
flex-wrap:wrap;
gap:12px;
}

.total-price{
font-size:24px;
font-weight:bold;
}

.breakdown{
font-size:14px;
margin-top:8px;
color:#333;
}

.btn-whatsapp{
background:#25D366;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

.btn-telegram{
background:#229ED9;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

@media(max-width:768px){
.calc-grid{
grid-template-columns:1fr;
}
.total-bar{
position:sticky;
bottom:0;
flex-direction:column;
align-items:flex-start;
}
}
</style>

</head>

<body>

<header class="hero">
<div class="hero-content container">
<h1>Tour / Calculator</h1>
</div>
</header>

<section class="section">
<div class="container">

<div class="calc-grid">

<div class="calc-block">
<h3>Number of People</h3>
<select id="people"></select>
</div>

<div class="calc-block">
<h3>Trip Date</h3>
<input type="date" id="tripDate">
</div>

<div class="calc-block">
<h3>Select Tour</h3>
<select id="tour"></select>
</div>

<div class="calc-block">
<h3>Select Guide(s)</h3>
<select id="guide" multiple></select>
<small>Choose one or more guides. Minimum calculated automatically</small>
</div>

<div class="calc-block">
<h3>Additional Places</h3>
<div id="places" class="checkbox-list"></div>
</div>

<div class="calc-block">
<h3>Additional Activities</h3>
<div id="activities" class="checkbox-list"></div>
</div>

</div>

<div class="total-bar">
<div>
<div>Total Price</div>
<div id="total" class="total-price">$0</div>
<div class="breakdown" id="breakdown"></div>
</div>

<div>
<button class="btn-whatsapp" id="whatsapp">WhatsApp</button>
<button class="btn-telegram" id="telegram">Telegram</button>
</div>
</div>

</div>
</section>

<footer>
<div class="container">
<a href="index.html" class="btn">← Back to main page</a>
</div>
</footer>

<script>
async function loadJSON(p){const r=await fetch(p);return await r.json();}

let tours,places,activities,guides,season;

async function init(){

tours=await loadJSON('data/tours.json');
places=await loadJSON('data/places.json');
activities=await loadJSON('data/activities.json');
guides=await loadJSON('data/guides.json');
season=await loadJSON('data/season.json');

for(let i=1;i<=32;i++)
people.innerHTML+=`<option>${i}</option>`;

tours.forEach(t=>tour.innerHTML+=`<option value="${t.id}">${t.title}</option>`);
guides.forEach(g=>guide.innerHTML+=`<option value="${g.id}">${g.title}</option>`);

places.forEach(p=>{
document.getElementById('places').innerHTML+=`
<label><input type="checkbox" value="${p.id}"> ${p.title}</label>`;
});

activities.forEach(a=>{
document.getElementById('activities').innerHTML+=`
<label><input type="checkbox" value="${a.id}"> ${a.title}</label>`;
});

// Live recalculation
document.querySelectorAll('select,input,#places input,#activities input').forEach(el=>{
    el.addEventListener('input',calculate);
});

calculate(); // initial
}

function getSeasonMultiplier(date){
if(!date) return 1;
const d=new Date(date);
const start=new Date(season.start);
const end=new Date(season.end);
return (d>=start&&d<=end)?season.high:season.low;
}

function calculate(){

const peopleCount=parseInt(document.getElementById('people').value);
const date=document.getElementById('tripDate').value;

const tourObj=tours.find(t=>t.id===tour.value);

let selectedGuides=[...document.querySelectorAll('#guide option:checked')]
.map(i=>guides.find(g=>g.id===i.value));

// auto add guides if selected less than needed
const minGuides=Math.ceil(peopleCount/4);
if(selectedGuides.length<minGuides){
for(let i=selectedGuides.length;i<minGuides;i++){
selectedGuides.push(guides[0]); // добавляем первого гида по умолчанию
}
}

const selectedPlaces=[...document.querySelectorAll('#places input:checked')]
.map(i=>places.find(p=>p.id===i.value));

const selectedActivities=[...document.querySelectorAll('#activities input:checked')]
.map(i=>activities.find(a=>a.id===i.value));

const totalDays=tourObj.days+selectedPlaces.reduce((s,p)=>s+p.days,0);

// CALC PRICES
const placesPrice=selectedPlaces.reduce((s,p)=>s+p.price,0);
const activitiesPrice=selectedActivities.reduce((s,a)=>{
    if(a.personPrice)return s+a.personPrice*peopleCount;
    if(a.groupPrice)return s+a.groupPrice;
    return s;
},0);

const guidesPrice=selectedGuides.reduce((s,g)=>s+g.price*totalDays,0);

const seasonMultiplier = getSeasonMultiplier(date);
const total=(tourObj.price+placesPrice+activitiesPrice+guidesPrice)*seasonMultiplier;

document.getElementById('total').textContent="$"+Math.round(total);

// BREAKDOWN
let breakdown=`Tour: $${tourObj.price}<br>
Places: $${placesPrice}<br>
Activities: $${activitiesPrice}<br>
Guides (${selectedGuides.length} x ${totalDays} days): $${guidesPrice}<br>
Season multiplier: x${seasonMultiplier}`;

document.getElementById('breakdown').innerHTML=breakdown;

// TEXT FOR MESSENGERS
const text = `Hello, I have selected the following parameters for the tour:
- People: ${peopleCount}
- Trip Date: ${date}
- Tour: ${tourObj.title}
- Guides: ${selectedGuides.map(g=>g.title).join(', ')}
- Additional Places: ${selectedPlaces.map(p=>p.title).join(', ') || 'None'}
- Additional Activities: ${selectedActivities.map(a=>a.title).join(', ') || 'None'}
- Total Price: $${Math.round(total)}
I would like to discuss booking this tour (-:`;

document.getElementById('whatsapp').onclick=()=>window.open("https://wa.me/996555900855?text="+encodeURIComponent(text));
document.getElementById('telegram').onclick=()=>window.open("https://t.me/ErkinMms?text="+encodeURIComponent(text));

}

document.addEventListener('DOMContentLoaded',init);

</script>

</body>
</html>
