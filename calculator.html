<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Calculator</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
    <div class="hero-content container">
        <h1>Tour / Calculator</h1>
    </div>
</header>

<section class="section">
<div class="container">

<h2 class="section-title">Tour Parameters</h2>

<!-- PEOPLE -->
<div class="form-block">
<label>Number of People</label>
<select id="people"></select>
</div>

<!-- DATE -->
<div class="form-block">
<label>Trip Date</label>
<input type="date" id="tripDate">
</div>

<!-- TOUR -->
<div class="form-block">
<label>Select Tour</label>
<select id="tour"></select>
</div>

<!-- PLACES -->
<div class="form-block">
<label>Additional Places</label>
<div id="places"></div>
</div>

<!-- ACTIVITIES -->
<div class="form-block">
<label>Additional Activities</label>
<div id="activities"></div>
</div>

<!-- GUIDE -->
<div class="form-block">
<label>Select Guide</label>
<select id="guide"></select>
</div>

<br>

<button class="btn" onclick="calculate()">Calculate</button>
<span id="total" style="margin-left:20px;font-weight:bold;"></span>

<br><br>

<button class="btn" id="whatsapp">WhatsApp</button>
<button class="btn" id="telegram">Telegram</button>

</div>
</section>

<div class="footer-spacer"></div>

<footer>
<div class="container">
<a href="index.html" class="btn">← Back to main page</a>
</div>
</footer>

<script>

async function loadJSON(path){
    const r = await fetch(path);
    return await r.json();
}

let tours, places, activities, guides, season;

async function init(){

    tours = await loadJSON('data/tours.json');
    places = await loadJSON('data/places.json');
    activities = await loadJSON('data/activities.json');
    guides = await loadJSON('data/guides.json');
    season = await loadJSON('data/season.json');

    // people
    const people = document.getElementById('people');
    for(let i=1;i<=32;i++){
        people.innerHTML += `<option value="${i}">${i}</option>`;
    }

    // tours
    const tour = document.getElementById('tour');
    tours.forEach(t=>{
        tour.innerHTML += `<option value="${t.id}">${t.title}</option>`;
    });

    // places
    const placesDiv = document.getElementById('places');
    places.forEach(p=>{
        placesDiv.innerHTML += `
        <div>
            <input type="checkbox" value="${p.id}">
            ${p.title}
        </div>`;
    });

    // activities
    const actDiv = document.getElementById('activities');
    activities.forEach(a=>{
        actDiv.innerHTML += `
        <div>
            <input type="checkbox" value="${a.id}">
            ${a.title}
        </div>`;
    });

    // guides
    const guide = document.getElementById('guide');
    guides.forEach(g=>{
        guide.innerHTML += `<option value="${g.id}">${g.title}</option>`;
    });

}

function getSeasonMultiplier(date){
    const d = new Date(date);
    const start = new Date(season.start);
    const end = new Date(season.end);

    if(d >= start && d <= end){
        return season.high;
    }
    return season.low;
}

function calculate(){

    const people = parseInt(document.getElementById('people').value);
    const date = document.getElementById('tripDate').value;

    const tourId = document.getElementById('tour').value;
    const guideId = document.getElementById('guide').value;

    const tour = tours.find(t=>t.id===tourId);
    const guide = guides.find(g=>g.id===guideId);

    let selectedPlaces = [...document.querySelectorAll('#places input:checked')]
        .map(i=>places.find(p=>p.id===i.value));

    let selectedActivities = [...document.querySelectorAll('#activities input:checked')]
        .map(i=>activities.find(a=>a.id===i.value));

    const totalDays =
        tour.days +
        selectedPlaces.reduce((s,p)=>s+p.days,0);

    const guidesCount = Math.ceil(people/4);

    const placesPrice =
        selectedPlaces.reduce((s,p)=>s+p.price,0);

    const activitiesPrice =
        selectedActivities.reduce((s,a)=>{
            if(a.personPrice)
                return s + a.personPrice * people;
            if(a.groupPrice)
                return s + a.groupPrice;
            return s;
        },0);

    const seasonMultiplier = getSeasonMultiplier(date);

    const total =
        (
        tour.price +
        placesPrice +
        activitiesPrice +
        (guidesCount * guide.price * totalDays)
        ) * seasonMultiplier;

    document.getElementById('total').textContent =
        "Total: $" + Math.round(total);

    const params =
        `People: ${people}, `+
        `Date: ${date}, `+
        `Tour: ${tour.title}`;

    const text =
`Hello, I have selected the following parameters for the tour:
${params}
and would like to discuss booking this tour (-:`;

    document.getElementById('whatsapp').onclick = () => {
        window.open(
            "https://wa.me/996555900855?text="+encodeURIComponent(text)
        );
    };

    document.getElementById('telegram').onclick = () => {
        window.open(
            "https://t.me/ErkinMms?text="+encodeURIComponent(text)
        );
    };

}

document.addEventListener('DOMContentLoaded', init);

</script>

</body>
</html>
