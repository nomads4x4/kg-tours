<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,sans-serif;
background:#F8F9FA;
color:#333;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:24px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

input,select{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#1f2a44;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

.activity-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h2>Calculate your tour</h2>

<label>People</label>
<input type="number" id="people" value="2">

<label>Route</label>
<select id="route"></select>

<label>Guide</label>
<select id="guide"></select>

<label>Car</label>
<select id="car"></select>

<label>Activities</label>
<div id="activities"></div>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<a id="wa" target="_blank">WhatsApp</a><br>
<a id="tg" target="_blank">Telegram</a>

</div>
</div>

<script>

let tours=[],guides=[],cars=[],activities=[]

async function load(){

tours=await fetch('./data/tours.json').then(r=>r.json())
guides=await fetch('./data/guides.json').then(r=>r.json())
cars=await fetch('./data/cars.json').then(r=>r.json())
activities=await fetch('./data/activities.json').then(r=>r.json())

tours.forEach((t,i)=>{
route.innerHTML+=`<option value="${i}">${t.name}</option>`
})

guides.forEach((g,i)=>{
guide.innerHTML+=`<option value="${i}">${g.name}</option>`
})

cars.forEach((c,i)=>{
car.innerHTML+=`<option value="${i}">${c.name}</option>`
})

activities.forEach((a,i)=>{
document.getElementById('activities').innerHTML+=`
<label class="activity-item">
<input type="checkbox" value="${i}">
<span>${a.name} (+${a.price}$)</span>
</label>`
})

}

function calculate(){

const people=parseInt(document.getElementById('people').value)

const routeSelect=document.getElementById('route')
const guideSelect=document.getElementById('guide')
const carSelect=document.getElementById('car')

const tour=tours[routeSelect.value]
const guide=guides[guideSelect.value]
const car=cars[carSelect.value]

let carsNeeded=Math.ceil(people/car.seats)

let total=tour.price + guide.price + car.price*carsNeeded

document.querySelectorAll('#activities input:checked').forEach(cb=>{
total+=activities[cb.value].price
})

document.getElementById('result').innerText="Total: "+total+" USD"

const text=`Hello! I selected:
People: ${people}
Route: ${tour.name}
Guide: ${guide.name}
Car: ${car.name}
Total: ${total} USD`

document.getElementById('wa').href=
"https://wa.me/996555900855?text="+encodeURIComponent(text)

document.getElementById('tg').href=
"https://t.me/ErkinMms?text="+encodeURIComponent(text)

}

load()

</script>

</body>
</html>
